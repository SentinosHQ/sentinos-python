[tox]
envlist = py310,py311,py312,py313
isolated_build = true

[testenv]
deps =
    .[dev]
    sentinos-sdk-core>=0.1.0
commands_pre =
    python -c "import pathlib, subprocess, sys; p=pathlib.Path(r'{toxinidir}')/'..'/'sdk-core'/'python'; sys.exit(0) if not p.exists() else subprocess.check_call([sys.executable,'-m','pip','install','-e',str(p)])"
commands =
    python -m ruff check sentinos tests
    python -m mypy sentinos
    python -m pytest -q
